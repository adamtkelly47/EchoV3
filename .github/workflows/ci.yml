name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Runs from the repo root (not scoped to echo/) — secrets can appear
  # anywhere in the repo (Docs/, frontend/, etc.), not just the backend.
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Secret scan
        run: |
          detect-secrets scan --baseline .secrets.baseline --exclude-files '\.venv/' --exclude-files 'skills-lock\.json'
          git diff --exit-code .secrets.baseline

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: echo
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e ".[dev]"

      - name: Format check (ruff format)
        run: ruff format --check .

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy apps scripts core infrastructure migrations

      - name: File/function size limits
        run: python scripts/check_size_limits.py apps core infrastructure

      - name: Architecture / import boundary check
        run: python scripts/check_architecture.py .

      - name: Dead code (vulture)
        run: vulture apps core infrastructure scripts

      - name: Security scan (bandit)
        run: bandit -r apps core infrastructure -c pyproject.toml

      - name: Dependency vulnerability scan (pip-audit)
        run: pip-audit

      - name: Tests (pytest + coverage)
        # No DATABASE_URL secret is configured in this workflow yet —
        # tests/integration/ skips itself gracefully rather than failing
        # (see Docs/TESTING.md). Verified for real against Neon locally.
        run: pytest --cov --cov-report=term-missing

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build
